openapi: 3.1.0
info:
  title: ZakiAuto API
  version: 1.0.0
  description: OpenAPI specification for the Laravel Sanctum API.
servers:
  - url: http://localhost:8000/api
    description: Local Laravel server
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Suppliers
  - name: Container Openers
  - name: Service Providers
  - name: Batches
  - name: Cars
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and create a Sanctum token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all access tokens for the authenticated user
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /ping:
    get:
      tags: [Auth]
      summary: Check authenticated API access
      responses:
        '200':
          description: Pong response with user roles
          content:
            application/json:
              schema:
                type: object
                required: [message, user_id, roles]
                properties:
                  message:
                    type: string
                    example: pong
                  user_id:
                    type: integer
                  roles:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
  /suppliers:
    get:
      tags: [Suppliers]
      summary: List suppliers
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated suppliers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Supplier'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Suppliers]
      summary: Create supplier
      requestBody:
        $ref: '#/components/requestBodies/SupplierBody'
      responses:
        '201':
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /suppliers/{supplier}:
    parameters:
      - $ref: '#/components/parameters/SupplierId'
    get:
      tags: [Suppliers]
      summary: Show supplier
      parameters:
        - name: with_stats
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Supplier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Suppliers]
      summary: Update supplier
      requestBody:
        $ref: '#/components/requestBodies/SupplierUpdateBody'
      responses:
        '200':
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags: [Suppliers]
      summary: Partially update supplier
      requestBody:
        $ref: '#/components/requestBodies/SupplierUpdateBody'
      responses:
        '200':
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Suppliers]
      summary: Delete supplier
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '422':
          $ref: '#/components/responses/MessageResponse'
  /container-openers:
    get:
      tags: [Container Openers]
      summary: List container openers
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated container openers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ContainerOpener'
    post:
      tags: [Container Openers]
      summary: Create container opener
      requestBody:
        $ref: '#/components/requestBodies/ContainerOpenerBody'
      responses:
        '201':
          description: Container opener created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerOpenerResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /container-openers/{container_opener}:
    parameters:
      - $ref: '#/components/parameters/ContainerOpenerId'
    get:
      tags: [Container Openers]
      summary: Show container opener
      responses:
        '200':
          description: Container opener
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerOpenerResponse'
    put:
      tags: [Container Openers]
      summary: Update container opener
      requestBody:
        $ref: '#/components/requestBodies/ContainerOpenerUpdateBody'
      responses:
        '200':
          description: Container opener updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerOpenerResponse'
    patch:
      tags: [Container Openers]
      summary: Partially update container opener
      requestBody:
        $ref: '#/components/requestBodies/ContainerOpenerUpdateBody'
      responses:
        '200':
          description: Container opener updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerOpenerResponse'
    delete:
      tags: [Container Openers]
      summary: Delete container opener
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '422':
          $ref: '#/components/responses/MessageResponse'
  /service-providers:
    get:
      tags: [Service Providers]
      summary: List service providers
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: provider_type
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated service providers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ServiceProvider'
    post:
      tags: [Service Providers]
      summary: Create service provider
      requestBody:
        $ref: '#/components/requestBodies/ServiceProviderBody'
      responses:
        '201':
          description: Service provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /service-providers/{service_provider}:
    parameters:
      - $ref: '#/components/parameters/ServiceProviderId'
    get:
      tags: [Service Providers]
      summary: Show service provider
      responses:
        '200':
          description: Service provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderResponse'
    put:
      tags: [Service Providers]
      summary: Update service provider
      requestBody:
        $ref: '#/components/requestBodies/ServiceProviderUpdateBody'
      responses:
        '200':
          description: Service provider updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderResponse'
    patch:
      tags: [Service Providers]
      summary: Partially update service provider
      requestBody:
        $ref: '#/components/requestBodies/ServiceProviderUpdateBody'
      responses:
        '200':
          description: Service provider updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderResponse'
    delete:
      tags: [Service Providers]
      summary: Delete service provider
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '422':
          $ref: '#/components/responses/MessageResponse'
  /batches:
    get:
      tags: [Batches]
      summary: List import batches
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: supplier_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BatchStatus'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated batches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Batch'
    post:
      tags: [Batches]
      summary: Create import batch
      requestBody:
        $ref: '#/components/requestBodies/BatchBody'
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /batches/{batch}:
    parameters:
      - $ref: '#/components/parameters/BatchId'
    get:
      tags: [Batches]
      summary: Show import batch
      responses:
        '200':
          description: Batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
    put:
      tags: [Batches]
      summary: Update import batch
      requestBody:
        $ref: '#/components/requestBodies/BatchUpdateBody'
      responses:
        '200':
          description: Batch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
    patch:
      tags: [Batches]
      summary: Partially update import batch
      requestBody:
        $ref: '#/components/requestBodies/BatchUpdateBody'
      responses:
        '200':
          description: Batch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
    delete:
      tags: [Batches]
      summary: Delete import batch
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '422':
          $ref: '#/components/responses/MessageResponse'
  /cars:
    get:
      tags: [Cars]
      summary: List cars
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CarStatus'
        - name: brand
          in: query
          schema:
            type: string
        - name: batch_id
          in: query
          schema:
            type: integer
        - name: supplier_id
          in: query
          schema:
            type: integer
        - name: vin
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated cars
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Car'
    post:
      tags: [Cars]
      summary: Create car
      requestBody:
        $ref: '#/components/requestBodies/CarBody'
      responses:
        '201':
          description: Car created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cars/{car}:
    parameters:
      - $ref: '#/components/parameters/CarId'
    get:
      tags: [Cars]
      summary: Show car
      responses:
        '200':
          description: Car
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
    put:
      tags: [Cars]
      summary: Update car
      requestBody:
        $ref: '#/components/requestBodies/CarUpdateBody'
      responses:
        '200':
          description: Car updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
    patch:
      tags: [Cars]
      summary: Partially update car
      requestBody:
        $ref: '#/components/requestBodies/CarUpdateBody'
      responses:
        '200':
          description: Car updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
    delete:
      tags: [Cars]
      summary: Delete car
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '422':
          $ref: '#/components/responses/MessageResponse'
  /cars/{car}/expenses:
    parameters:
      - $ref: '#/components/parameters/CarId'
    get:
      tags: [Cars]
      summary: List car expenses
      responses:
        '200':
          description: Car expenses
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarExpense'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Cars]
      summary: Create car expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarExpenseRequest'
      responses:
        '201':
          description: Car expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarExpenseResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    Search:
      name: search
      in: query
      schema:
        type: string
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 15
    SupplierId:
      name: supplier
      in: path
      required: true
      schema:
        type: integer
    ContainerOpenerId:
      name: container_opener
      in: path
      required: true
      schema:
        type: integer
    ServiceProviderId:
      name: service_provider
      in: path
      required: true
      schema:
        type: integer
    BatchId:
      name: batch
      in: path
      required: true
      schema:
        type: integer
    CarId:
      name: car
      in: path
      required: true
      schema:
        type: integer
  requestBodies:
    SupplierBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SupplierRequest'
    SupplierUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SupplierUpdateRequest'
    ContainerOpenerBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContainerOpenerRequest'
    ContainerOpenerUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContainerOpenerUpdateRequest'
    ServiceProviderBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServiceProviderRequest'
    ServiceProviderUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServiceProviderUpdateRequest'
    BatchBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchRequest'
    BatchUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchUpdateRequest'
    CarBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CarRequest'
    CarUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CarUpdateRequest'
  responses:
    MessageResponse:
      description: Message response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
  schemas:
    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationError:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    AuthTokenResponse:
      type: object
      required: [message, user, token]
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 150
        phone:
          type: string
          nullable: true
          maxLength: 30
        password:
          type: string
          minLength: 8
          format: password
        password_confirmation:
          type: string
          format: password
        device_name:
          type: string
          nullable: true
          maxLength: 100
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        device_name:
          type: string
          nullable: true
          maxLength: 100
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        is_active:
          type: boolean
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        agent_id:
          type: integer
          nullable: true
        customer_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
    PaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items: {}
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        links:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                nullable: true
              label:
                type: string
              active:
                type: boolean
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    SupplierRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
        phone:
          type: string
          nullable: true
          maxLength: 30
        email:
          type: string
          format: email
          nullable: true
          maxLength: 150
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    SupplierUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SupplierRequest'
      required: []
    SupplierResponse:
      type: object
      required: [data]
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Supplier'
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        batches_count:
          type: integer
        cars_count:
          type: integer
        total_paid:
          type: number
          format: double
        batches:
          type: array
          items:
            $ref: '#/components/schemas/Batch'
        cars:
          type: array
          items:
            $ref: '#/components/schemas/Car'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/SupplierPayment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SupplierMini:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
    ContainerOpenerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
        phone:
          type: string
          nullable: true
          maxLength: 30
        email:
          type: string
          format: email
          nullable: true
          maxLength: 150
        address:
          type: string
          nullable: true
        nif:
          type: string
          nullable: true
          maxLength: 50
        notes:
          type: string
          nullable: true
    ContainerOpenerUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ContainerOpenerRequest'
      required: []
    ContainerOpenerResponse:
      type: object
      required: [data]
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/ContainerOpener'
    ContainerOpener:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        address:
          type: string
          nullable: true
        nif:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        cars_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ServiceProviderRequest:
      type: object
      required: [name, provider_type]
      properties:
        name:
          type: string
          maxLength: 150
        phone:
          type: string
          nullable: true
          maxLength: 30
        email:
          type: string
          format: email
          nullable: true
          maxLength: 150
        provider_type:
          type: string
          maxLength: 100
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
