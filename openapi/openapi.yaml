      summary: تحديث الحقول العامة للطلب (ليس الحالة)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_id:
                  type: integer
                notes:
                  type: string
      responses:
        '200':
          description: تم تحديث الطلب بنجاح
    delete:
      tags: [Orders]
      summary: حذف طلب (يحرر السيارة لتصبح available)
      responses:
        '200':
          description: تم حذف الطلب بنجاح
        '422':
          description: لا يمكن الحذف لوجود دفعات مسجلة

  /orders/{order}/status:
    parameters:
      - name: order
        in: path
        required: true
        schema:
          type: integer
    patch:
      tags: [Orders]
      summary: تغيير حالة الطلب (تسلسل صارم خطوة بخطوة فقط)
      description: |
        التسلسل الإلزامي: new → purchased → shipping → arrived_at_port →
        ready_for_delivery → delivered. لا يمكن تخطي خطوة أو الرجوع للخلف.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [purchased, shipping, arrived_at_port, ready_for_delivery, delivered]
                date:
                  type: string
                  format: date
      responses:
        '200':
          description: تم تحديث حالة الطلب بنجاح
        '422':
          description: لا يمكن تغيير الحالة مباشرة بدون اتباع التسلسل

  /customer-payments:
    get:
      tags: [CustomerPayments]
      summary: قائمة دفعات العملاء
      parameters:
        - name: order_id
          in: query
          schema:
            type: integer
        - name: is_remitted
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerPayment'
    post:
      tags: [CustomerPayments]
      summary: تسجيل دفعة عميل على طلب
      description: |
        - received_by=company: تدخل خزينة الشركة مباشرة (treasury "in").
        - received_by=agent: تُسجَّل كدَين على الوكيل (agent_transactions "out")
          حتى يتم تحويلها فعليًا عبر POST /customer-payments/{id}/remit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, customer_id, amount, received_by, payment_date]
              properties:
                order_id:
                  type: integer
                customer_id:
                  type: integer
                amount:
                  type: number
                received_by:
                  type: string
                  enum: [company, agent]
                agent_id:
                  type: integer
                  description: مطلوب إن كان received_by=agent
                payment_date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '201':
          description: تم تسجيل دفعة العميل بنجاح
        '422':
          description: المبلغ يتجاوز المتبقي على الطلب أو بيانات غير متطابقة

  /customer-payments/{customer_payment}:
    parameters:
      - name: customer_payment
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [CustomerPayments]
      summary: عرض دفعة عميل
      responses:
        '200':
          description: نجح
    delete:
      tags: [CustomerPayments]
      summary: حذف دفعة عميل (يُسجّل حركة عكسية في مصدرها)
      responses:
        '200':
          description: تم حذف الدفعة بنجاح
        '422':
          description: لا يمكن الحذف إن كانت الدفعة مُحوَّلة للخزينة بالفعل

  /customer-payments/{customer_payment}/remit:
    parameters:
      - name: customer_payment
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [CustomerPayments]
      summary: تأكيد تحويل دفعة جمعها وكيل إلى خزينة الشركة
      description: |
        يُنشئ حركة "in" في AgentTransaction (تُصفّي دَين الوكيل) وحركة "in"
        في TreasuryTransaction (الشركة تستلم المال فعليًا)، مترابطتين عبر
        المفاتيح الدائرية الموجودة في الـ migration الأصلي.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '200':
          description: تم تأكيد التحويل بنجاح
        '422':
          description: الدفعة لم تُجمَع بواسطة وكيل، أو تم تحويلها مسبقًا

  /agent-transactions:
    get:
      tags: [AgentTransactions]
      summary: قائمة حركات حسابات الوكلاء
      parameters:
        - name: agent_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentTransaction'
    post:
      tags: [AgentTransactions]
      summary: تسجيل حركة يدوية على حساب وكيل (عمولة، سحب، تصحيح)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, direction, amount, transaction_date, notes]
              properties:
                agent_id:
                  type: integer
                direction:
                  type: string
                  enum: [in, out]
                amount:
                  type: number
                transaction_date:
                  type: string
                  format: date
                notes:
                  type: string
                  description: إلزامي - يجب توضيح سبب الحركة
      responses:
        '201':
          description: تم تسجيل الحركة بنجاح

  /agent-transactions/{agent_transaction}:
    parameters:
      - name: agent_transaction
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [AgentTransactions]
      summary: عرض حركة
      responses:
        '200':
          description: نجح
    delete:
      tags: [AgentTransactions]
      summary: حذف حركة يدوية فقط (الحركات التلقائية تُحذف من مصدرها)
      responses:
        '200':
          description: تم حذف الحركة بنجاح
        '422':
          description: لا يمكن حذف حركة ناتجة تلقائيًا عن دفعة أو تحويل

  /expenses:
    get:
      tags: [Expenses]
      summary: قائمة المصاريف العامة
      parameters:
        - name: car_id
          in: query
          schema:
            type: integer
        - name: order_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
    post:
      tags: [Expenses]
      summary: تسجيل مصروف (مرتبط بسيارة أو طلب على الأقل)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expense_type, amount, expense_date]
              properties:
                car_id:
                  type: integer
                order_id:
                  type: integer
                service_provider_id:
                  type: integer
                expense_type:
                  type: string
                amount:
                  type: number
                expense_date:
                  type: string
                  format: date
      responses:
        '201':
          description: تم تسجيل المصروف بنجاح

  /expenses/{expense}:
    parameters:
      - name: expense
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Expenses]
      summary: عرض مصروف
      responses:
        '200':
          description: نجح
    put:
      tags: [Expenses]
      summary: تحديث مصروف
      responses:
        '200':
          description: تم التحديث بنجاح
    delete:
      tags: [Expenses]
      summary: حذف مصروف
      responses:
        '200':
          description: تم الحذف بنجاح

  /invoices:
    get:
      tags: [Invoices]
      summary: قائمة الفواتير (customer يرى فواتير طلباته فقط)
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
    post:
      tags: [Invoices]
      summary: إنشاء فاتورة من طلب (تأخذ صورة من إجمالي/مدفوع/متبقي وقت الإنشاء)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id:
                  type: integer
      responses:
        '201':
          description: تم إنشاء الفاتورة بنجاح
        '422':
          description: يوجد فاتورة لهذا الطلب مسبقًا

  /invoices/{invoice}:
    parameters:
      - name: invoice
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Invoices]
      summary: عرض فاتورة
      responses:
        '200':
          description: نجح
    delete:
      tags: [Invoices]
      summary: حذف فاتورة
      responses:
        '200':
          description: تم الحذف بنجاح

  /invoices/{invoice}/refresh:
    parameters:
