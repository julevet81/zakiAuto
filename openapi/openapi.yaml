        '200':
          description: نجح
    post:
      tags: [Users]
      summary: إنشاء حساب موظف (admin/agent) - الطريقة الوحيدة لإنشائها
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [super-admin, admin, agent, customer]
                agent:
                  type: object
                  description: مطلوب إن كان role=agent
                  properties:
                    name:
                      type: string
                    phone:
                      type: string
      responses:
        '201':
          description: تم إنشاء المستخدم بنجاح

