  /dashboard:
    get:
      tags: [Dashboard]
      summary: الإحصائيات العامة
      description: |
        أرقام الربح (total_purchase_cost, total_expenses, total_profit) تظهر
        فقط لمن يملك صلاحية reports.view_profit (super-admin فقط).
      responses:
        '200':
          description: نجح
          content:
