  /users:
    get:
      tags: [Users]
      summary: قائمة المستخدمين
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [super-admin, admin, agent, customer]
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PerPage'
