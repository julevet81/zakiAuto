openapi: 3.0.3
info:
  title: نظام إدارة استيراد وبيع السيارات - API
  description: |
    واجهة برمجية كاملة لإدارة عمليات استيراد وبيع السيارات: الموردين، السيارات،
    العملاء، الوكلاء، الطلبات، الدفعات المالية، الفواتير، والإحصائيات.

    ## الأدوار والصلاحيات
    - **super-admin**: صلاحية كاملة على كل أجزاء النظام، بما فيها أسعار الشراء
      والشحن والربح لكل سيارة، وإدارة الأدوار والصلاحيات.
    - **admin**: صلاحية كاملة على كل أجزاء النظام **ما عدا** أسعار الشراء
      والشحن وأرباح كل سيارة (`cars.view_cost`, `reports.view_profit`).
    - **agent**: الوصول فقط لعملائه وطلباته وكشف حسابه الخاص.
    - **customer**: عرض طلباته وفواتيره ودفعاته فقط.

    ## المصادقة
    كل المسارات (عدا `/auth/register` و `/auth/login`) تتطلب
    `Authorization: Bearer <token>` تم الحصول عليه من تسجيل الدخول.
  version: 1.0.0
  contact:
    name: فريق التطوير

servers:
  - url: http://localhost:8000/api
    description: بيئة التطوير المحلية
  - url: https://your-domain.com/api
    description: بيئة الإنتاج (عدّل الرابط)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: تسجيل الدخول، التسجيل، الجلسة الحالية
  - name: Suppliers
    description: إدارة الموردين
  - name: SupplierPayments
    description: دفعات الموردين
  - name: Batches
    description: دفعات الاستيراد (الحاويات)
  - name: Cars
    description: إدارة السيارات
  - name: ContainerOpeners
    description: جهات فتح الحاويات
  - name: ServiceProviders
    description: مزودو الخدمات
  - name: Customers
    description: إدارة العملاء
  - name: Agents
    description: إدارة الوكلاء وكشوف حساباتهم
  - name: Orders
    description: الطلبات وحالاتها
  - name: CustomerPayments
    description: دفعات العملاء
  - name: AgentTransactions
    description: حركات حساب الوكلاء
  - name: Expenses
    description: المصاريف العامة
  - name: Invoices
    description: الفواتير
  - name: Documents
    description: مستندات السيارات
  - name: Dashboard
    description: الإحصائيات العامة
  - name: Users
    description: إدارة المستخدمين والأدوار
  - name: Settings
    description: إعدادات النظام

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Personal Access Token
      description: "تسجّل دخول عبر /auth/login وتستخدم التوكن المُستلم: Authorization: Bearer <token>"

  parameters:
    PerPage:
      name: per_page
      in: query
      description: عدد العناصر في الصفحة
      schema:
        type: integer
        default: 15
    Page:
      name: page
      in: query
      description: رقم الصفحة
      schema:
        type: integer
        default: 1
    SearchParam:
      name: search
      in: query
      description: بحث نصي
      schema:
        type: string

  responses:
    Unauthenticated:
      description: غير مسجل الدخول
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthenticated.
    Forbidden:
      description: لا تملك الصلاحية اللازمة
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: لا تملك الصلاحية اللازمة للقيام بهذا الإجراء
    NotFound:
      description: السجل غير موجود
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: لا يوجد سجل بهذا المعرف
    ValidationError:
      description: خطأ في التحقق من صحة البيانات
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: The given data was invalid.
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string

  schemas:
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        batches_count:
          type: integer
        cars_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Car:
      type: object
      properties:
        id:
          type: integer
        batch_id:
          type: integer
          nullable: true
          description: مرئي فقط لمن يملك صلاحية suppliers.view
        supplier_id:
          type: integer
          nullable: true
        brand:
          type: string
        model:
          type: string
        finition:
          type: string
          nullable: true
        manufacture_year:
          type: integer
        color:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        foreign_purchase_price:
          type: number
          nullable: true
          description: مرئي فقط لمن يملك صلاحية cars.view_cost (super-admin)
        sale_price:
          type: number
        status:
          type: string
          enum: [available, reserved, shipping, arrived, delivered, sold]
        is_sold:
          type: boolean

    Customer:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        agent_id:
          type: integer
          nullable: true
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        national_id:
          type: string
          nullable: true
        passport_no:
          type: string
          nullable: true
        address:
          type: string
          nullable: true

    CustomerDocument:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        title:
          type: string
        file_type:
          type: string
        file_size:
          type: string
        url:
          type: string
          format: uri
        uploaded_by:
          type: integer
        uploader:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        current_balance:
          type: number

    Order:
      type: object
      properties:
        id:
          type: integer
        order_number:
          type: string
        customer_id:
          type: integer
        car_id:
          type: integer
        agent_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [new, purchased, shipping, arrived_at_port, ready_for_delivery, delivered]
        status_label:
          type: string
        paid_amount:
          type: number
        remaining_amount:
          type: number
        notes:
          type: string
          nullable: true

    CustomerPayment:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        customer_id:
          type: integer
        amount:
          type: number
        received_by:
          type: string
          enum: [company, agent]
        agent_id:
          type: integer
          nullable: true
        remittance_id:
          type: integer
          nullable: true
        is_remitted:
          type: boolean
        payment_date:
          type: string
          format: date

    AgentTransaction:
      type: object
      properties:
        id:
          type: integer
        agent_id:
          type: integer
        direction:
          type: string
          enum: [in, out]
        amount:
          type: number
        previous_balence:
          type: number
        current_balence:
          type: number
        transaction_date:
          type: string
          format: date
        notes:
          type: string
          nullable: true

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string

    DashboardStats:
      type: object
      properties:
        customers_count:
          type: integer
        suppliers_count:
          type: integer
        cars_count:
          type: integer
        orders_count:
          type: integer
        agents_count:
          type: integer
        total_sales:
          type: number
        total_commissions:
          type: number
        total_purchase_cost:
          type: number
          description: super-admin فقط (reports.view_profit)
        total_expenses:
          type: number
          description: super-admin فقط (reports.view_profit)
        total_profit:
          type: number
          description: super-admin فقط (reports.view_profit)

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: تسجيل حساب عميل جديد
      description: ينشئ دائمًا حسابًا بدور customer مع سجل Customer مرتبط.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  example: أحمد محمد
                email:
                  type: string
                  example: ahmed@example.com
                phone:
                  type: string
                  example: "0555123456"
                password:
                  type: string
                  example: password123
                password_confirmation:
                  type: string
                  example: password123
      responses:
        '201':
          description: تم إنشاء الحساب بنجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: تسجيل الدخول
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: superadmin@example.com
                password:
                  type: string
                  example: ChangeMe123!
                device_name:
                  type: string
                  example: web-dashboard
      responses:
        '200':
          description: تم تسجيل الدخول بنجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '422':
          description: بيانات الدخول غير صحيحة أو الحساب معطل
          content:
            application/json:
              schema:
                $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      tags: [Auth]
      summary: بيانات المستخدم الحالي مع أدواره وصلاحياته
      responses:
        '200':
          description: نجح
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /auth/logout:
    post:
      tags: [Auth]
      summary: تسجيل الخروج (هذا الجهاز فقط)
      responses:
        '200':
          description: تم تسجيل الخروج بنجاح
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: تسجيل الخروج من جميع الأجهزة
      responses:
        '200':
          description: تم تسجيل الخروج من جميع الأجهزة بنجاح
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /ping:
    get:
      tags: [Auth]
      summary: فحص سريع لصحة المصادقة والأدوار
      responses:
        '200':
          description: pong

  /suppliers:
    get:
      tags: [Suppliers]
      summary: قائمة الموردين
      parameters:
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: نجح
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Supplier'
                  meta:
                    $ref: '#/components/schemas/Pagination'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Suppliers]
      summary: إضافة مورد جديد
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                address:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: تم إضافة المورد بنجاح
        '422':
          $ref: '#/components/responses/ValidationError'

  /suppliers/{supplier}:
    parameters:
      - name: supplier
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Suppliers]
      summary: عرض مورد مع سياراته وطلباته ودفعاته
      responses:
        '200':
          description: نجح
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Suppliers]
      summary: تحديث بيانات مورد
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: تم التحديث بنجاح
    delete:
      tags: [Suppliers]
      summary: حذف مورد (يُرفض إن وُجدت سيارات أو دفعات مرتبطة)
      responses:
        '200':
          description: تم الحذف بنجاح
        '422':
          description: لا يمكن الحذف لوجود سجلات مرتبطة

  /supplier-payments:
    get:
      tags: [SupplierPayments]
      summary: قائمة دفعات الموردين
      parameters:
        - name: supplier_id
          in: query
          schema:
            type: integer
        - name: batch_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
    post:
      tags: [SupplierPayments]
      summary: تسجيل دفعة لمورد على دفعة استيراد محددة
      description: |
        ينشئ تلقائيًا حركة خزينة (out)، ويعيد حساب total_paid_amount_foreign
        للدفعة، ويرقّي حالتها من partial إلى fully_paid عند اكتمال السداد.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batch_id, supplier_id, amount_foreign, exchange_rate, payment_date]
              properties:
                batch_id:
                  type: integer
                supplier_id:
                  type: integer
                amount_foreign:
                  type: number
                exchange_rate:
                  type: number
                amount_local:
                  type: number
                  description: يُحسب تلقائيًا إن لم يُرسَل
                payment_date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '201':
          description: تم تسجيل دفعة المورد بنجاح
        '422':
          $ref: '#/components/responses/ValidationError'

  /supplier-payments/{supplier_payment}:
    parameters:
      - name: supplier_payment
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [SupplierPayments]
      summary: عرض دفعة مورد
      responses:
        '200':
          description: نجح
    patch:
      tags: [SupplierPayments]
      summary: تعديل دفعة مورد (يُعيد حساب إجمالي الدفعة وخزينة الشركة)
      responses:
        '200':
          description: تم التحديث بنجاح
    delete:
      tags: [SupplierPayments]
      summary: حذف دفعة مورد (يُسجّل حركة خزينة عكسية)
      responses:
        '200':
          description: تم الحذف بنجاح
        '422':
          description: لا يمكن الحذف إن كانت الدفعة مُحوَّلة بالفعل

  /batches/import:
    post:
      tags: [Batches]
      summary: استيراد دفعة استيراد وسيارات من ملف إكسل
      description: ينشئ دفعة جديدة ويستورد كل السيارات المرتبطة بها والعملاء والطلبات من ملف إكسل المرفوع.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [supplier_id, file]
              properties:
                supplier_id:
                  type: integer
                  description: معرف المورد
                  example: 1
                container_opener_id:
                  type: integer
                  description: معرف جهة فتح الحاوية
                  nullable: true
                  example: 1
                exchange_rate:
                  type: number
                  description: سعر الصرف الحالي (لتحويل التكلفة الإجمالية للعملة المحلية)
                  example: 3.75
                purchase_date:
                  type: string
                  format: date
                  description: تاريخ الشراء
                  example: "2026-07-03"
                total_cost_foreign:
                  type: number
                  description: التكلفة الإجمالية بالعملة الأجنبية
                  example: 15000.00
                notes:
                  type: string
                  description: ملاحظات إضافية
                  example: "ملاحظات حول الدفعة المستوردة"
                file:
                  type: string
                  format: binary
                  description: ملف إكسل (xlsx, xls, csv) يحتوي على قائمة السيارات
      responses:
        '201':
          description: تم استيراد دفعة الاستيراد والسيارات بنجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "تم استيراد دفعة الاستيراد والسيارات بنجاح"
                  data:
                    type: object
                    properties:
                      batch:
                        type: object
                        description: تفاصيل الدفعة التي تم إنشاؤها
                      created:
                        type: integer
                        description: عدد السيارات التي تم إنشاؤها بنجاح
                        example: 5
                      skipped:
                        type: integer
                        description: عدد الأسطر التي تم تخطيها بسبب أخطاء
                        example: 1
                      errors:
                        type: array
                        description: قائمة الأخطاء بالتفصيل مع رقم السطر
                        items:
                          type: object
                          properties:
                            row:
                              type: integer
                              example: 3
                            errors:
                              type: array
                              items:
                                type: string
                              example: ["رقم الهيكل (VIN) مكرر"]
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /batches:
    get:
      tags: [Batches]
      summary: قائمة دفعات الاستيراد
      parameters:
        - name: supplier_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [partial, fully_paid]
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: نجح
    post:
      tags: [Batches]
      summary: إنشاء دفعة استيراد جديدة
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplier_id, purchase_date, exchange_rate]
              properties:
                supplier_id:
                  type: integer
                purchase_date:
                  type: string
                  format: date
                exchange_rate:
                  type: number
                notes:
                  type: string
      responses:
        '201':
          description: تم إنشاء دفعة الاستيراد بنجاح

  /batches/{batch}:
    parameters:
      - name: batch
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Batches]
      summary: عرض دفعة استيراد مع سياراتها ودفعاتها
      responses:
        '200':
          description: نجح
    put:
      tags: [Batches]
      summary: تحديث دفعة استيراد (يشمل تحديث الحالة يدويًا)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [partial, fully_paid]
      responses:
        '200':
          description: تم التحديث بنجاح
    delete:
      tags: [Batches]
      summary: حذف دفعة استيراد
      responses:
        '200':
          description: تم الحذف بنجاح
        '422':
          description: لا يمكن الحذف لوجود سيارات أو دفعات مرتبطة

  /cars/table:
    get:
      tags: [Cars]
      summary: جدول السيارات المسطّح بالأعمدة المحددة (super-admin فقط - cars.view_cost)
      description: |
        صف واحد لكل سيارة بالأعمدة بالضبط: brand, model, finition,
        manufacture_year, color, vin, foreign_purchase_price,
        tracking_number, customer_full_name, customer_passport_no,
        customer_national_id, first_owner_name, first_owner_passport_no,
        first_owner_national_id, current_owner_name, current_owner_passport_no,
        current_owner_national_id, shipping_price, arrival_date.

        هذا تقرير تكلفة بالكامل (يحتوي سعر الشراء وتكلفة الشحن)، لذا يتطلب
